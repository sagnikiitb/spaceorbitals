<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Orbital Energy Conglomerate</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            padding: 20px;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #58a6ff;
        }
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 0.9rem;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label { margin-bottom: 5px; font-weight: bold; }
        input[type=range] { width: 200px; cursor: pointer; }
        #plotDiv {
            flex-grow: 1;
            width: 100%;
        }
        .value-display { font-weight: normal; color: #8b949e; }
    </style>
</head>
<body>

    <div id="header">
        <h1>Continuous 2D Orbit Conglomerate</h1>
        <div class="controls">
            <div class="control-group">
                <label>Specific Energy (km²/s²): <span id="energyVal" class="value-display">-15.0</span></label>
                <input type="range" id="energySlider" min="-50" max="-2" step="0.5" value="-15">
            </div>
            <div class="control-group">
                <label>Density (Convolutions): <span id="densityVal" class="value-display">150</span></label>
                <input type="range" id="densitySlider" min="50" max="400" step="10" value="150">
            </div>
        </div>
    </div>

    <div id="plotDiv"></div>

    <script>
        // Earth Gravitational Parameter (km^3 / s^2) and Radius (km)
        const MU = 398600;
        const R_EARTH = 6371;

        // Elements
        const energySlider = document.getElementById('energySlider');
        const densitySlider = document.getElementById('densitySlider');
        const energyVal = document.getElementById('energyVal');
        const densityVal = document.getElementById('densityVal');

        // Event Listeners for UI
        energySlider.addEventListener('input', updatePlot);
        densitySlider.addEventListener('input', updatePlot);

        // Generates the 3D surface representing Earth
        function getEarthTrace() {
            const u = [], v = [], x = [], y = [], z = [];
            const resolution = 30;
            for (let i = 0; i <= resolution; i++) {
                u.push((i / resolution) * Math.PI);
                v.push((i / resolution) * 2 * Math.PI);
            }
           
            for (let i = 0; i <= resolution; i++) {
                x[i] = []; y[i] = []; z[i] = [];
                for (let j = 0; j <= resolution; j++) {
                    x[i][j] = R_EARTH * Math.sin(u[i]) * Math.cos(v[j]);
                    y[i][j] = R_EARTH * Math.sin(u[i]) * Math.sin(v[j]);
                    z[i][j] = R_EARTH * Math.cos(u[i]);
                }
            }

            return {
                type: 'surface',
                x: x, y: y, z: z,
                colorscale: [[0, '#1f4e79'], [1, '#2b7a0b']],
                showscale: false,
                opacity: 0.8,
                hoverinfo: 'none',
                name: 'Earth'
            };
        }

        // Generates the continuous parameterized 3D orbital curve
        function getOrbitConglomerate(energy, convolutions) {
            // Calculate fixed semi-major axis 'a' from energy
            const a = -MU / (2 * energy);
           
            const x_vals = [], y_vals = [], z_vals = [], color_vals = [];
            const pointsPerConv = 100;
            const totalPoints = convolutions * pointsPerConv;
           
            // Generate a continuous curve by slightly varying Keplerian elements over pseudo-time
            for (let step = 0; step < totalPoints; step++) {
                // Theta acts as our driving parameter (true anomaly + time analog)
                const theta = (step / pointsPerConv) * 2 * Math.PI;

                // Slowly varying orbital parameters to create a space-filling continuous curve
                // We use irrational/non-harmonic divisors to prevent the orbit from repeating itself too early
                const e = 0.45 + 0.45 * Math.sin(theta / 23.11);
                const i = (Math.PI / 2) * (1 + Math.sin(theta / 37.53));
                const Omega = theta / 41.27;
                const omega = theta / 29.83;

                // Radius of current 2D ellipse (polar equation)
                const r = (a * (1 - e * e)) / (1 + e * Math.cos(theta));

                // 2D Cartesian in the orbital plane
                const x_prime = r * Math.cos(theta);
                const y_prime = r * Math.sin(theta);

                // 3D Euler Rotations (Z-X-Z Convention)
                // 1. Argument of Periapsis (Z-axis)
                const x1 = x_prime * Math.cos(omega) - y_prime * Math.sin(omega);
                const y1 = x_prime * Math.sin(omega) + y_prime * Math.cos(omega);
               
                // 2. Inclination (X-axis)
                const x2 = x1;
                const y2 = y1 * Math.cos(i);
                const z2 = y1 * Math.sin(i);

                // 3. Longitude of Ascending Node (Z-axis)
                const x3 = x2 * Math.cos(Omega) - y2 * Math.sin(Omega);
                const y3 = x2 * Math.sin(Omega) + y2 * Math.cos(Omega);
                const z3 = z2;

                x_vals.push(x3);
                y_vals.push(y3);
                z_vals.push(z3);
                color_vals.push(e); // Color trace by eccentricity
            }

            return {
                type: 'scatter3d',
                mode: 'lines',
                x: x_vals,
                y: y_vals,
                z: z_vals,
                line: {
                    width: 2,
                    color: color_vals,
                    colorscale: 'Plasma',
                    cmin: 0,
                    cmax: 0.9,
                    showscale: true,
                    colorbar: { title: 'Eccentricity (e)', x: 0.9, titlefont: {color: '#c9d1d9'}, tickfont: {color: '#c9d1d9'} }
                },
                hoverinfo: 'none',
                name: 'Orbital Shell'
            };
        }

        // Core render/update function
        function updatePlot() {
            const energy = parseFloat(energySlider.value);
            const convolutions = parseInt(densitySlider.value);
           
            energyVal.textContent = energy.toFixed(1);
            densityVal.textContent = convolutions;

            const a = -MU / (2 * energy);
            // Dynamic axis scaling based on energy/semi-major axis
            const rangeMax = a * 2.1;

            const data = [getEarthTrace(), getOrbitConglomerate(energy, convolutions)];

            const layout = {
                paper_bgcolor: '#0d1117',
                margin: { l: 0, r: 0, b: 0, t: 0 },
                scene: {
                    xaxis: { title: 'X (km)', range: [-rangeMax, rangeMax], gridcolor: '#30363d', zerolinecolor: '#8b949e', color: '#c9d1d9' },
                    yaxis: { title: 'Y (km)', range: [-rangeMax, rangeMax], gridcolor: '#30363d', zerolinecolor: '#8b949e', color: '#c9d1d9' },
                    zaxis: { title: 'Z (km)', range: [-rangeMax, rangeMax], gridcolor: '#30363d', zerolinecolor: '#8b949e', color: '#c9d1d9' },
                    aspectmode: 'cube',
                    camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } }
                },
                showlegend: false
            };

            Plotly.react('plotDiv', data, layout);
        }

        // Initialize Plot on load
        updatePlot();
    </script>
</body>
</html>
